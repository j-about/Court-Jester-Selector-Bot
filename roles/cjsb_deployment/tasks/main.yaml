- name: Check if /opt/cjsb directory exists
  stat:
    path: /opt/cjsb
  register: cjsb_dir

- name: Teardown existing Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: /opt/cjsb
    files:
      - docker-compose.yml
    state: absent
  when: cjsb_dir.stat.exists

- name: Create /opt/cjsb directory
  become: true
  file:
    path: "/opt/cjsb"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Sync project files
  ansible.posix.synchronize:
    src: "../../../{{ item }}"
    dest: "/opt/cjsb/"
  loop:
    - main.py
    - config.py
    - database.py
    - models.py
    - queries.py
    - observability.py
    - handlers
    - utils
    - alembic
    - pyproject.toml
    - uv.lock
    - alembic.ini
    - docker-entrypoint.sh
    - Dockerfile
    - docker-compose.yml
    - .dockerignore
    - .env

- name: Deploy Court Jester Selector Bot with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "/opt/cjsb"
    files:
      - docker-compose.yml
    build: always
    state: present
